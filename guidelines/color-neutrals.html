<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:0;font-family:var(--font-head);display:flex;height:150px}
.sw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
.h{font-size:13px;font-weight:700}.c{font-size:11px;opacity:.7;margin-top:2px}</style></head>
<body>
<div class="sw" style="background:var(--ongang-black);color:#fff"><div class="h">딥 블랙</div><div class="c">#191919</div></div>

<div class="sw" style="background:var(--ongang-charcoal);color:#fff"><div class="h">차콜</div><div class="c">#333333</div></div>

<div class="sw" style="background:var(--ongang-light);color:#333"><div class="h">라이트</div><div class="c">#DDDDDD</div></div>
<div class="sw" style="background:var(--ongang-cream);color:#333"><div class="h">크림</div><div class="c">#F5F2E9</div></div>
<div class="sw" style="background:var(--ongang-warm-white);color:#333;border:1px solid #eee"><div class="h">웜 화이트</div><div class="c">#FFFCF7</div></div>
